name: Coaching jobs

on:
  schedule:
    - cron: "*/30 * * * 1-5"
    - cron: "30 23 * * 1-5"
    - cron: "45 23 * * 5"
    - cron: "50 23 28-31 * *"
    - cron: "55 23 28-31 3,6,9,12 *"
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        default: "grading"
        type: choice
        options:
          - grading
          - daily
          - weekly
          - monthly
          - quarterly
          - all
      force:
        description: "Force gated summary jobs to run"
        required: false
        default: false
        type: boolean
      skipSlack:
        description: "Generate without Slack delivery"
        required: false
        default: false
        type: boolean

concurrency:
  group: coaching-jobs
  cancel-in-progress: false

jobs:
  run-coaching-job:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EVENT_SCHEDULE: ${{ github.event.schedule }}
      REQUESTED_JOB: ${{ github.event.inputs.job || '' }}
      FORCE: ${{ github.event.inputs.force || 'false' }}
      SKIP_SLACK: ${{ github.event.inputs.skipSlack || 'false' }}
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
      CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_ACCESS_TOKEN: ${{ secrets.SLACK_ACCESS_TOKEN }}
      SLACK_MANAGER_CHANNEL_ID: ${{ secrets.SLACK_MANAGER_CHANNEL_ID }}
      SLACK_REP_TARGETS_JSON: ${{ secrets.SLACK_REP_TARGETS_JSON }}
      COACH_TIMEZONE: ${{ vars.COACH_TIMEZONE || 'America/New_York' }}
      COACH_BUSINESS_START_HOUR: ${{ vars.COACH_BUSINESS_START_HOUR || '6' }}
      COACH_BUSINESS_END_HOUR: ${{ vars.COACH_BUSINESS_END_HOUR || '22' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install -r requirements.txt

      - name: Run coaching job
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOSE_API_KEY}" || -z "${DATABASE_URL}" ]]; then
            echo "CLOSE_API_KEY and DATABASE_URL repository secrets are required." >&2
            exit 1
          fi

          if [[ -z "${OPENROUTER_API_KEY}" && -z "${OPENAI_API_KEY}" ]]; then
            echo "OPENROUTER_API_KEY or OPENAI_API_KEY repository secret is required." >&2
            exit 1
          fi

          job_from_schedule() {
            case "${EVENT_SCHEDULE}" in
              "*/30 * * * 1-5") echo "grading" ;;
              "30 23 * * 1-5") echo "daily" ;;
              "45 23 * * 5") echo "weekly" ;;
              "50 23 28-31 * *") echo "monthly" ;;
              "55 23 28-31 3,6,9,12 *") echo "quarterly" ;;
              *) echo "grading" ;;
            esac
          }

          run_job() {
            local job="$1"
            local args=()

            if [[ "${FORCE}" == "true" ]]; then
              args+=("--force")
            fi

            if [[ "${SKIP_SLACK}" == "true" && "$job" != "grading" ]]; then
              args+=("--skip-slack")
            fi

            echo "Running ${job}"
            case "$job" in
              grading) node scripts/coach/run-hourly.mjs "${args[@]}" ;;
              daily) node scripts/coach/run-eod-daily-summary.mjs "${args[@]}" ;;
              weekly) node scripts/coach/run-weekly-summary.mjs "${args[@]}" ;;
              monthly) node scripts/coach/run-monthly-summary.mjs "${args[@]}" ;;
              quarterly) node scripts/coach/run-quarterly-summary.mjs "${args[@]}" ;;
              *) echo "Unknown job: $job" >&2; exit 1 ;;
            esac
          }

          selected_job="${REQUESTED_JOB:-}"
          if [[ -z "${selected_job}" ]]; then
            selected_job="$(job_from_schedule)"
          fi

          if [[ "${selected_job}" == "all" ]]; then
            for job in grading daily weekly monthly quarterly; do
              run_job "$job"
            done
          else
            run_job "${selected_job}"
          fi
